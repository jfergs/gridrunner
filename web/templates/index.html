<!doctype html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>GRIDRUNNER</title>
  <style>
    body {
      background: #0d1021;
      color: #f3e8ff;
      font-family: monospace;
      margin: 0;
      padding: 16px;
    }
    h1 { color: #c084fc; }
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
      gap: 12px;
    }
    button {
      width: 100%;
      padding: 16px;
      border-radius: 14px;
      border: 1px solid #1f2437;
      background: #16192b;
      color: #f3e8ff;
      font-size: 16px;
    }
    button:hover {
      background: #1f2437;
    }
    .danger { color: #fb7185; }
    .panel {
      margin-top: 16px;
      padding: 14px;
      background: #16192b;
      border: 1px solid #1f2437;
      border-radius: 14px;
    }
    pre {
      white-space: pre-wrap;
      overflow-x: auto;
      font-size: 12px;
    }
  </style>
</head>
<body>
  <h1>GRIDRUNNER</h1>
  <p>operator: ghost · status: active</p>
  <p>
  <a href="http://gridrunner.local/tar1090/" target="_blank">✈ Open ADS-B Map</a>
</p>
  <div class="grid">
    <form method="post" action="/run"><input type="hidden" name="action" value="health"><button>Health</button></form>
    <form method="post" action="/run"><input type="hidden" name="action" value="ghostevent"><button>Run Events</button></form>
    <form method="post" action="/run"><input type="hidden" name="action" value="inventory"><button>Radio Inventory</button></form>
    <form method="post" action="/run"><input type="hidden" name="action" value="hamcheck"><button>Ham Check</button></form>
    <form method="post" action="/run"><input type="hidden" name="action" value="backup"><button>Backup</button></form>
    <form method="post" action="/run"><input type="hidden" name="action" value="adsbmode"><button>ADS-B Mode</button></form>
    <form method="post" action="/run"><input type="hidden" name="action" value="sdrmode"><button class="danger">SDR Mode</button></form>
  </div>

  <div class="panel">
    <h2>Recent Ghost Events</h2>
    <pre>{{ events }}</pre>
  </div>

  <div class="panel">
    <h2>System Health</h2>
    <pre>{{ status }}</pre>
  </div>
</body>
</html>
